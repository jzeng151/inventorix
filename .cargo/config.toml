# Android cross-compilation setup.
# NDK 30+ no longer ships unversioned clang wrappers, but crates like `ring`
# look for them via the CC_<target> env var. Point each target at the
# api-24-versioned binary (matches minSdkVersion = 24).

[env]
NDK_BIN = "/Users/jason/Library/Android/sdk/ndk/30.0.14904198/toolchains/llvm/prebuilt/darwin-x86_64/bin"

CC_aarch64_linux_android    = "/Users/jason/Library/Android/sdk/ndk/30.0.14904198/toolchains/llvm/prebuilt/darwin-x86_64/bin/aarch64-linux-android24-clang"
AR_aarch64_linux_android    = "/Users/jason/Library/Android/sdk/ndk/30.0.14904198/toolchains/llvm/prebuilt/darwin-x86_64/bin/llvm-ar"

CC_armv7_linux_androideabi  = "/Users/jason/Library/Android/sdk/ndk/30.0.14904198/toolchains/llvm/prebuilt/darwin-x86_64/bin/armv7a-linux-androideabi24-clang"
AR_armv7_linux_androideabi  = "/Users/jason/Library/Android/sdk/ndk/30.0.14904198/toolchains/llvm/prebuilt/darwin-x86_64/bin/llvm-ar"

CC_i686_linux_android       = "/Users/jason/Library/Android/sdk/ndk/30.0.14904198/toolchains/llvm/prebuilt/darwin-x86_64/bin/i686-linux-android24-clang"
AR_i686_linux_android       = "/Users/jason/Library/Android/sdk/ndk/30.0.14904198/toolchains/llvm/prebuilt/darwin-x86_64/bin/llvm-ar"

CC_x86_64_linux_android     = "/Users/jason/Library/Android/sdk/ndk/30.0.14904198/toolchains/llvm/prebuilt/darwin-x86_64/bin/x86_64-linux-android24-clang"
AR_x86_64_linux_android     = "/Users/jason/Library/Android/sdk/ndk/30.0.14904198/toolchains/llvm/prebuilt/darwin-x86_64/bin/llvm-ar"
